# Production overrides — usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - uploads:/app/uploads

  frontend:
    command: npx serve dist -l 5173
    environment:
      - NODE_ENV=production
